body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;

/* خلفية متحركة */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#0ea5e9 1px,transparent 1px);
background-size:40px 40px;
animation:moveBg 25s linear infinite;

}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

.container{
text-align:center;

padding:40px 30px;
border-radius:22px;
width:360px;

}

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:3px solid #38bdf8;

color:white;
background:#111827;
padding:14px;
margin:10px 0;
border-radius:14px;
transition:.35s;

}

.links a:hover{
transform:translateY(-3px);
box-shadow:0 0 15px rgba(56,189,248,.5);
background:#1f2937;
}

.links i{
font-size:20px;
cursor:pointer;
}

.footer{
